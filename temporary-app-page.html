<!DOCTYPE html>
<html lang="en">

<body class="page-app">

<header>
 
  <!-- LEFT: Main Logo -->
  <div class="header-left">
    <div class="site-branding">
      <img src="images/businesses/alexander-design-lab/alexander-design-lab-logo.png" 
           alt="Alexander Design Lab Logo" loading="lazy">
    </div>
  </div>

  <!-- CENTER: Navigation -->
  <div class="header-center">
    <nav class="circle-nav">
      <div class="nav-circles">
          <a class="nav-circle nav-spacer" aria-hidden="true"></a>
          <a href="index.html" class="nav-circle home">Home</a>
          <a href="illustrations.html" class="nav-circle illustration">Illustration</a>
          <a href="logo-designs.html" class="nav-circle logos">Logos</a>
          <a href="brand-identity.html" class="nav-circle branding">Branding</a>

    <span class="header-name">Alexander Olson</span>
    <div class="header-ao-logo">
      <img src="images/businesses/alexander-olson-logo/ao-logo-white.png" 
           alt="AO Logo" loading="lazy">
    </div>
  </div>

<!-- NEW CONTENT -->
<section id="portfolio" class="section-with-border-1">
<main>

  <div class="coming-soon-wrapper">
    <img src="images/businesses/coming-soon.png" 
         alt="Coming Soon" 
         class="coming-soon-image"
         loading="lazy">

  </div>

</main>

<!-- IMAGE PROTECTION SCRIPTS -->
<script>
  document.addEventListener("contextmenu", function(e) {
    if (e.target.closest(".image-wrapper")) {
      e.preventDefault();
    }
  });

  document.addEventListener("touchstart", function(e) {
    if (e.target.closest(".image-wrapper")) {
      e.preventDefault();
    }
  }, { passive: false });
</script>
