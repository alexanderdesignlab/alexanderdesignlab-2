  <div class="header-center">
    <nav class="circle-nav">
      <div class="nav-circles">
        <a href="index.html" class="nav-circle home">Home</a>

        <div class="overlay"></div>
      </div>
    </div>

    <div class="media-item">
      <div class="image-wrapper hover-zoom">
        <img src="images/businesses/uptown-drapes/uptown-drapes-black-square.png"

      <div class="image-wrapper hover-zoom">

        <div class="watermark"></div>
        <div class="overlay"></div>
      </div>
    </div>

    <div class="media-item">
      <div class="image-wrapper hover-zoom">
        <img src="images/businesses/uptown-drapes/uptown-drapes-white-square.png"

        <div class="watermark"></div>
        <div class="overlay"></div>
      </div>
    </div>

    <div class="media-item">

<!-- IMAGE PROTECTION SCRIPTS -->
<script>
  document.addEventListener("contextmenu", function(e) {
    if (e.target.closest(".image-wrapper")) {
      e.preventDefault();
    }
  });

  document.addEventListener("touchstart", function(e) {
    if (e.target.closest(".image-wrapper")) {
      e.preventDefault();
    }
  }, { passive: false });
</script>

</body>
