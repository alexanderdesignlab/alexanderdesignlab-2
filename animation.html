<section id="portfolio" class="section-with-border-1">
<main>

  <h3>Animation</h3>

  <!-- NEW GROUPED-SLIDE CROSSFADE CAROUSEL -->
  <div class="animation-carousel">

    <div class="carousel-stage">

      <!-- Slide 1 -->
      <div class="carousel-slide active">
        <div class="carousel-caption">Flour Sack Character</div>
        <video class="carousel-video flour-sack raise-small" muted loop loading="lazy" preload="none">

        </video>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-slide">
        <div class="carousel-caption">Bouncing Ball</div>
        <video class="carousel-video" muted loop loading="lazy" preload="none">
          <source src="images/animation/ball-animation.mp4" type="video/mp4">
        </video>
      </div>

      <!-- Slide 3 -->
      <div class="carousel-slide">
        <div class="carousel-caption">Line Coming to Life</div>
        <video class="carousel-video raise-med" muted loop loading="lazy" preload="none">
          <source src="images/animation/line-animation.mp4" type="video/mp4">
        </video>
      </div>

    </div>

    <div class="carousel-controls">
      <button class="carousel-btn left" id="prevBtn">&#10094;</button>
      <button class="carousel-btn right" id="nextBtn">&#10095;</button>
    </div>

  </div>

</main>

<!-- NEW CROSSFADE CAROUSEL SCRIPT -->
<script>
(function () {
  const slides = Array.from(document.querySelectorAll('.carousel-slide'));
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  if (!slides.length || !prevBtn || !nextBtn) return;

  let currentIndex = 0;

  function showSlide(index) {
    slides.forEach((slide, i) => {
      const video = slide.querySelector('video');

      if (i === index) {
        slide.classList.add('active');
        if (video) {
          video.currentTime = 0;
          video.play().catch(() => {});
        }
      } else {
        slide.classList.remove('active');
        if (video) {
          video.pause();
        }
      }
    });
  }

  function goNext() {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  }

  function goPrev() {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    showSlide(currentIndex);
  }

  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goPrev();
    if (e.key === 'ArrowRight') goNext();
  });

  showSlide(currentIndex);
})();
</script>
